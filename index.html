<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>People Insight Generator - Prepare for your meetings</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography,forms,aspect-ratio"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <style>
      /* CRITICAL PRINT STYLES - FIXES BLANK PDF ISSUE */

      /* CRITICAL PRINT STYLES - FIXES BLANK PDF ISSUE */
      @media print {
        @page {
          margin: 1.5cm;
          size: A4 portrait;
        }
        
        /* 1. Force ALL content to be visible, regardless of JS-driven animations */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          animation: none !important;
          transition: none !important;
          transform: none !important;
          opacity: 1 !important;
          visibility: visible !important;
          box-shadow: none !important;
        }

        /* 2. Remove UI elements that shouldn't be in a report */
        header, nav, footer, .no-print, button, [role="button"], .action-toolbar {
          display: none !important;
          visibility: hidden !important;
          height: 0 !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* 3. Reset layout constraints that cause blank pages */
        html, body, #root, main {
          background: white !important;
          width: 100% !important;
          height: auto !important;
          min-height: 0 !important;
          overflow: visible !important;
          display: block !important;
          position: static !important;
        }

        .print-container {
          display: block !important;
          width: 100% !important;
          max-width: none !important;
          border: none !important;
          padding: 0 !important;
          margin: 0 !important;
        }

        .print-content {
          display: block !important;
          padding: 0 !important;
          margin: 0 auto !important;
          width: 100% !important;
          max-width: 100% !important;
        }

        /* 4. Page Break Management */
        h1, h2, h3 { page-break-after: avoid; break-after: avoid; }
        section, table, tr, li, .break-inside-avoid {
          page-break-inside: avoid !important;
          break-inside: avoid !important;
        }
        
        img, canvas { max-width: 100% !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
